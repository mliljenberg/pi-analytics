<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Pi Analytics</title>
	</head>
	<body>
		<div class="app" id="appRoot">
			<header class="topbar">
				<div class="brand"><span class="mark" aria-hidden="true"></span><span>Pi Analytics</span></div>
				<div class="top-status" id="topStatus">No workspace</div>
				<div class="top-actions">
					<select class="model-select" id="modelSelect" aria-label="Model"></select>
					<select class="recent-select" id="recentWorkspaceSelect" aria-label="Open recent workspace"></select>
					<button class="ghost-button" id="openFolderButton">Open folder</button>
					<button class="ghost-button" id="newBoardButton">New board</button>
					<button class="ghost-button" id="abortButton">Abort</button>
					<button class="dark-button" id="reportButton">Report</button>
				</div>
			</header>

			<main class="stage">
				<section class="canvas-wrap" aria-label="Canvas area">
					<div class="canvas-shell" id="canvasShell">
						<canvas class="workspace-canvas" id="workspaceCanvas" layoutsubtree aria-label="Analytics canvas"></canvas>
						<div class="card-host" id="cardHost"></div>
						<div class="empty-hint" id="emptyHint">
							<strong>Open a folder</strong>
							<span>Then ask Pi to analyze the workspace.</span>
						</div>
					</div>
				</section>

				<div class="context-bar" id="contextBar" aria-live="polite">
					<span class="selected-count" id="selectedCount">0 selected</span>
					<button class="soft-button" id="askSelectedButton">Ask</button>
					<button class="soft-button" id="keepSelectedButton">Keep</button>
					<button class="soft-button" id="openSelectedButton">Open</button>
					<button class="soft-button" id="exportSelectedButton">Export</button>
					<button class="soft-button" id="deleteSelectedButton">Delete</button>
				</div>

				<section class="chat-dock" id="chatDock" aria-label="Chat with Pi">
					<button class="dock-toggle" id="dockToggleButton" type="button">Dock right</button>
					<div class="chat-tabs" id="chatTabs" aria-label="Chat tabs"></div>
					<div class="chat-log" id="chatLog"></div>
					<div class="agent-loading" id="agentLoading">
						<div><strong>Pi</strong> <span id="agentLoadingText">Working</span></div>
						<div class="loading-track"><span></span></div>
					</div>
					<div class="queue-stack" id="queueStack"></div>
					<div class="selected-note" id="selectedNote"></div>
					<form class="composer" id="composer">
						<input id="chatInput" autocomplete="off" aria-label="Ask Pi" placeholder="Ask Pi about the workspace or selected canvas items">
						<div class="composer-actions">
							<button class="soft-button queue-button" id="steerButton" type="button">Steer</button>
							<button class="soft-button queue-button" id="queueNextButton" type="button">Queue next</button>
							<button class="dark-button" id="sendButton" type="submit">Send</button>
						</div>
					</form>
				</section>
			</main>
		</div>

		<div class="login-modal" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
			<form class="login-panel" id="loginForm">
				<div class="login-head">
					<h1 id="loginTitle">Login required</h1>
					<p id="loginSubtitle">Add a provider API key before opening a workspace.</p>
				</div>
				<label class="field-label" for="loginProvider">Provider</label>
				<select class="field-control" id="loginProvider"></select>
				<label class="field-label" id="loginApiKeyLabel" for="loginApiKey">API key</label>
				<input class="field-control" id="loginApiKey" type="password" autocomplete="off" spellcheck="false">
				<label class="field-label" id="loginModelLabel" for="loginModel">Model</label>
				<select class="field-control" id="loginModel"></select>
				<p class="login-error" id="loginError" role="alert"></p>
				<button class="dark-button login-submit" id="loginSubmitButton" type="submit">Login</button>
			</form>
		</div>

		<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Focused canvas item">
			<article class="focus-view">
				<div class="focus-head">
					<div>
						<h2 id="modalTitle">Canvas item</h2>
						<p id="modalSubtitle"></p>
					</div>
					<div class="focus-actions">
						<button class="soft-button" id="modalKeepButton">Keep</button>
						<button class="soft-button" id="modalExportButton">Export</button>
						<button class="dark-button" id="modalCloseButton">Close</button>
					</div>
				</div>
				<div class="focus-body" id="modalBody"></div>
			</article>
		</div>

		<div class="toast" id="toast" role="status"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
