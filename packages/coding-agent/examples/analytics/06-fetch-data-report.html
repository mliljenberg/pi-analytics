<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Trends — Fetched Data Report</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --warn: #d29922; --danger: #f85149; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text); padding: 2rem; max-width: 1000px; margin: 0 auto;
  }
  h1 { color: var(--accent); margin-bottom: 0.25rem; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  .error-box { padding: 1rem; border: 1px solid var(--danger); border-radius: 6px;
    background: rgba(248,81,73,.08); color: var(--danger); margin: 1rem 0; }
  .loading { color: var(--warn); padding: 2rem; text-align: center; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); text-align: left; }
  th { background: var(--surface); color: var(--accent); position: sticky; top: 0; }
  tr:nth-child(even) { background: rgba(22,27,34,.5); }
  .bar-fill { height: 14px; background: var(--green); border-radius: 3px; min-width: 2px; }
  .bar-track { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 0.8rem; }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    th, td { font-size: 0.85rem; padding: 0.4rem; }
  }
</style>
</head>
<body>
<h1>Monthly Revenue Trends</h1>
<p class="meta" id="report-meta">Loading data...</p>

<div id="content" class="loading">⏳ Fetching output/monthly_trends.json...</div>

<footer>Generated by Pi Analytics Agent · Fetched-data report example (fetch() from local JSON)</footer>

<script>
// This report loads data from a local JSON file next to it.
// For file:// URLs, some browsers block fetch(). If that happens
// the error message guides the user to embed the data directly.

const reportMeta = document.getElementById("report-meta");
const content = document.getElementById("content");

function renderTable(rows) {
  if (!rows || rows.length === 0) {
    content.innerHTML = '<div class="error-box">⚠️ No data available. The query may have returned zero rows, or the data format is unexpected.</div>';
    return;
  }

  const keys = Object.keys(rows[0]);
  let html = '<table><thead><tr>';
  keys.forEach(k => { html += `<th>${k}</th>`; });
  html += '</tr></thead><tbody>';

  const maxRevenue = Math.max(...rows.map(r => parseFloat(r.total_revenue) || 0));

  rows.forEach(row => {
    html += '<tr>';
    keys.forEach(k => {
      const val = row[k];
      if (k === 'total_revenue' || k === 'revenue') {
        const pct = maxRevenue > 0 ? ((parseFloat(val) || 0) / maxRevenue * 100).toFixed(1) : 0;
        html += `<td>$${parseFloat(val).toLocaleString()}<br><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></td>`;
      } else {
        html += `<td>${val}</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  content.innerHTML = html;
}

function handleError(err) {
  content.innerHTML = `<div class="error-box">
    <p><strong>Could not load data:</strong> ${err.message}</p>
    <p>Ensure <code>output/monthly_trends.json</code> exists relative to this HTML file.</p>
    <p>If you're opening this file with <code>file://</code>, some browsers block <code>fetch()</code> for local files.</p>
    <p>Workaround: embed the data directly in the HTML, or serve with a local server.</p>
  </div>`;
}

fetch("output/monthly_trends.json")
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
    return r.json();
  })
  .then(payload => {
    reportMeta.textContent = `June 2026 · Source: adventure-works-sales.csv · Query: monthly_trends.sql`;
    renderTable(payload.rows || payload);
  })
  .catch(err => {
    reportMeta.textContent = `June 2026 · ⚠️ Data unavailable`;
    handleError(err);
  });
</script>
</body>
</html>
