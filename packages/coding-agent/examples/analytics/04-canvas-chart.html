<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue by Region — Canvas Bar Chart</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --accent: #58a6ff; --green: #3fb950; --purple: #bc8cff; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text); padding: 2rem; max-width: 900px; margin: 0 auto;
  }
  h1 { color: var(--accent); margin-bottom: 0.25rem; }
  .meta { color: #8b949e; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .chart-container { background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 1.5rem; }
  canvas { display: block; max-width: 100%; height: auto; }
  footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
    color: #8b949e; font-size: 0.8rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
  th, td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); text-align: left; }
  th { background: var(--surface); color: var(--accent); }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .chart-container { padding: 1rem; }
  }
</style>
</head>
<body>
<h1>Revenue by Region</h1>
<p class="meta">June 2026 · Source: sales-10000.csv · Query: revenue_by_region.sql</p>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<table>
  <thead><tr><th>Region</th><th>Total Revenue</th><th>% of Total</th></tr></thead>
  <tbody id="table-body"></tbody>
</table>

<footer>Generated by Pi Analytics Agent · Canvas bar chart example</footer>

<script>
const data = [
  { region: "North America", total_revenue: 2450000, pct_of_total: 42.5 },
  { region: "Europe", total_revenue: 1850000, pct_of_total: 32.1 },
  { region: "Asia Pacific", total_revenue: 980000, pct_of_total: 17.0 },
  { region: "Latin America", total_revenue: 320000, pct_of_total: 5.5 },
  { region: "Middle East", total_revenue: 165000, pct_of_total: 2.9 },
];

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
const dpr = window.devicePixelRatio || 1;
const width = canvas.parentElement.clientWidth - 48;
const height = 300;

canvas.width = width * dpr;
canvas.height = height * dpr;
canvas.style.width = width + "px";
canvas.style.height = height + "px";
ctx.scale(dpr, dpr);

const padding = { top: 20, right: 30, bottom: 60, left: 80 };
const chartW = width - padding.left - padding.right;
const chartH = height - padding.top - padding.bottom;
const maxVal = Math.max(...data.map(d => d.total_revenue));
const barWidth = (chartW / data.length) * 0.7;
const barGap = (chartW / data.length) * 0.3;

// Background
ctx.fillStyle = "#161b22";
ctx.fillRect(0, 0, width, height);

// Y-axis grid
ctx.strokeStyle = "#30363d";
ctx.lineWidth = 1;
for (let i = 0; i <= 4; i++) {
  const y = padding.top + (chartH * i / 4);
  ctx.beginPath();
  ctx.moveTo(padding.left, y);
  ctx.lineTo(width - padding.right, y);
  ctx.stroke();
  ctx.fillStyle = "#8b949e";
  ctx.font = "11px -apple-system, sans-serif";
  ctx.textAlign = "right";
  ctx.fillText("$" + ((maxVal * (4 - i) / 4) / 1000).toFixed(0) + "K", padding.left - 8, y + 4);
}

// Bars
const colors = ["#58a6ff", "#3fb950", "#bc8cff", "#d29922", "#f85149"];
data.forEach((d, i) => {
  const barH = (d.total_revenue / maxVal) * chartH;
  const x = padding.left + (i * (chartW / data.length)) + barGap / 2;
  const y = padding.top + chartH - barH;

  ctx.fillStyle = colors[i];
  ctx.fillRect(x, y, barWidth, barH);

  // Label
  ctx.fillStyle = "#c9d1d9";
  ctx.font = "10px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(d.region, x + barWidth / 2, padding.top + chartH + 16);
});

// Table
const tbody = document.getElementById("table-body");
data.forEach(d => {
  tbody.innerHTML += `<tr>
    <td>${d.region}</td>
    <td>$${d.total_revenue.toLocaleString()}</td>
    <td>${d.pct_of_total}%</td>
  </tr>`;
});
</script>
</body>
</html>
