<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Distribution — SVG Donut Chart</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --accent: #58a6ff; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg); color: var(--text); padding: 2rem; max-width: 900px; margin: 0 auto;
  }
  h1 { color: var(--accent); margin-bottom: 0.25rem; }
  .meta { color: #8b949e; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .chart-row { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
  .chart-container { background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 1.5rem; flex: 0 0 auto; }
  .legend { flex: 1; min-width: 200px; }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
  th, td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); text-align: left; }
  th { background: var(--surface); color: var(--accent); }
  footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
    color: #8b949e; font-size: 0.8rem; }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    .chart-row { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>
<h1>Sales by Category</h1>
<p class="meta">June 2026 · Source: sales-10000.csv · Query: sales_by_category.sql</p>

<div class="chart-row">
  <div class="chart-container">
    <svg viewBox="0 0 220 220" width="220" height="220" id="donut"></svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<table>
  <thead><tr><th>Category</th><th>Revenue</th><th>Share</th></tr></thead>
  <tbody id="table-body"></tbody>
</table>

<footer>Generated by Pi Analytics Agent · SVG donut chart example</footer>

<script>
const data = [
  { category: "Electronics", revenue: 1230000, pct: 35.2 },
  { category: "Clothing", revenue: 890000, pct: 25.5 },
  { category: "Home & Garden", revenue: 670000, pct: 19.2 },
  { category: "Sports", revenue: 420000, pct: 12.0 },
  { category: "Books", revenue: 285000, pct: 8.1 },
];

const colors = ["#58a6ff", "#3fb950", "#bc8cff", "#d29922", "#f85149"];
const cx = 110, cy = 110, outerR = 90, innerR = 55;
const total = data.reduce((s, d) => s + d.pct, 0);

let cumulative = 0;
const svg = document.getElementById("donut");
const legend = document.getElementById("legend");
const tbody = document.getElementById("table-body");

data.forEach((d, i) => {
  const sliceAngle = (d.pct / total) * 360;
  const startAngle = cumulative;
  const endAngle = cumulative + sliceAngle;
  cumulative = endAngle;

  const startRad = ((startAngle - 90) * Math.PI) / 180;
  const endRad = ((endAngle - 90) * Math.PI) / 180;

  const x1 = cx + outerR * Math.cos(startRad);
  const y1 = cy + outerR * Math.sin(startRad);
  const x2 = cx + outerR * Math.cos(endRad);
  const y2 = cy + outerR * Math.sin(endRad);
  const x3 = cx + innerR * Math.cos(endRad);
  const y3 = cy + innerR * Math.sin(endRad);
  const x4 = cx + innerR * Math.cos(startRad);
  const y4 = cy + innerR * Math.sin(startRad);

  const largeArc = sliceAngle > 180 ? 1 : 0;

  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d",
    `M ${x1} ${y1} A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2} ${y2} ` +
    `L ${x3} ${y3} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x4} ${y4} Z`
  );
  path.setAttribute("fill", colors[i]);
  path.setAttribute("stroke", "#0d1117");
  path.setAttribute("stroke-width", "2");

  // Center label for slices > 8%
  if (d.pct > 8) {
    const midAngle = ((startAngle + endAngle) / 2 - 90) * Math.PI / 180;
    const labelR = (outerR + innerR) / 2;
    const lx = cx + labelR * Math.cos(midAngle);
    const ly = cy + labelR * Math.sin(midAngle);
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", lx);
    text.setAttribute("y", ly);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("dominant-baseline", "middle");
    text.setAttribute("fill", "#0d1117");
    text.setAttribute("font-size", "11");
    text.setAttribute("font-weight", "bold");
    text.setAttribute("font-family", "-apple-system, sans-serif");
    text.textContent = d.pct + "%";
    svg.appendChild(text);
  }

  svg.appendChild(path);

  // Legend
  legend.innerHTML += `<div class="legend-item">
    <div class="legend-swatch" style="background:${colors[i]}"></div>
    <span>${d.category}: $${d.revenue.toLocaleString()} (${d.pct}%)</span>
  </div>`;

  // Table
  tbody.innerHTML += `<tr>
    <td>${d.category}</td>
    <td>$${d.revenue.toLocaleString()}</td>
    <td>${d.pct}%</td>
  </tr>`;
});
</script>
</body>
</html>
