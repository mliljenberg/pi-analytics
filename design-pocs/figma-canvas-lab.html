<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi Analytics Canvas Lab</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f7f8fb;
      --paper: #ffffff;
      --ink: #101114;
      --muted: #6f7480;
      --quiet: #9aa1ad;
      --line: rgba(16, 17, 20, .10);
      --soft-line: rgba(16, 17, 20, .06);
      --blue: #286ef0;
      --mint: #16a889;
      --coral: #ef6a4f;
      --plum: #7b61ff;
      --amber: #d89826;
      --glass: rgba(255, 255, 255, .76);
      --shadow-sm: 0 10px 30px rgba(27, 31, 40, .08);
      --shadow-md: 0 24px 80px rgba(27, 31, 40, .13);
      --shadow-lg: 0 42px 140px rgba(27, 31, 40, .22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        linear-gradient(130deg, rgba(40, 110, 240, .08), rgba(255, 255, 255, 0) 38%),
        linear-gradient(205deg, rgba(22, 168, 137, .07), rgba(255, 255, 255, 0) 46%),
        var(--page);
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 24px;
      border-bottom: 1px solid var(--soft-line);
      background: rgba(247, 248, 251, .78);
      backdrop-filter: blur(22px);
      position: relative;
      z-index: 30;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 190px;
      font-weight: 700;
      font-size: 14px;
    }

    .mark {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .9), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, var(--blue), var(--plum) 52%, var(--mint));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .6), 0 8px 20px rgba(40, 110, 240, .22);
    }

    .top-status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ghost-button,
    .dark-button,
    .soft-button,
    .chip,
    .icon-button {
      min-height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .ghost-button,
    .soft-button,
    .chip,
    .icon-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .7);
      color: var(--ink);
    }

    .ghost-button {
      padding: 0 12px;
      font-size: 13px;
    }

    .soft-button {
      padding: 0 12px;
      font-size: 13px;
      background: rgba(255, 255, 255, .9);
    }

    .dark-button {
      padding: 0 14px;
      background: #101114;
      color: #fff;
      font-weight: 650;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(16, 17, 20, .18);
    }

    .chip {
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      color: #3f4652;
      font-size: 13px;
      background: rgba(255, 255, 255, .62);
    }

    .icon-button {
      width: 32px;
      padding: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .ghost-button:hover,
    .soft-button:hover,
    .chip:hover,
    .icon-button:hover {
      border-color: rgba(16, 17, 20, .18);
      background: #fff;
      transform: translateY(-1px);
    }

    .dark-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(16, 17, 20, .22);
    }

    .stage {
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .canvas-wrap {
      height: calc(100vh - 56px);
      overflow: auto;
      padding: 34px 34px 190px;
    }

    .canvas {
      position: relative;
      min-width: 1420px;
      min-height: 940px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(16, 17, 20, .035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16, 17, 20, .035) 1px, transparent 1px),
        rgba(255, 255, 255, .34);
      background-size: 48px 48px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .62);
    }

    .empty-hint {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%);
      width: min(330px, calc(100vw - 48px));
      text-align: center;
      color: var(--quiet);
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .empty-hint.hidden {
      opacity: 0;
    }

    .empty-hint strong {
      display: block;
      color: #444a55;
      font-size: 15px;
      margin-bottom: 7px;
    }

    .empty-hint span {
      display: block;
      font-size: 13px;
      line-height: 1.45;
    }

    .context-bar {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      z-index: 25;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .84);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(22px);
    }

    .context-bar.open {
      display: flex;
    }

    .selected-count {
      min-width: 82px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .chat-dock {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 28;
      width: min(760px, calc(100vw - 32px));
      border: 1px solid rgba(16, 17, 20, .10);
      border-radius: 8px;
      background: rgba(255, 255, 255, .84);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(28px);
      overflow: hidden;
    }

    .chat-log {
      max-height: 112px;
      overflow: auto;
      padding: 12px 14px 0;
      display: grid;
      gap: 7px;
    }

    .message {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .message strong {
      color: var(--ink);
      font-weight: 650;
    }

    .selected-note {
      display: none;
      margin: 10px 14px 0;
      color: var(--blue);
      font-size: 12px;
    }

    .selected-note.open {
      display: block;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 12px 12px 10px;
    }

    .composer input {
      width: 100%;
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      outline: none;
      background: rgba(246, 247, 250, .92);
      color: var(--ink);
      padding: 0 14px;
      font-size: 15px;
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .composer input:focus {
      border-color: rgba(40, 110, 240, .28);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(40, 110, 240, .10);
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .canvas-card {
      position: absolute;
      width: var(--w);
      min-height: var(--h);
      left: var(--x);
      top: var(--y);
      border: 1px solid rgba(16, 17, 20, .10);
      border-radius: 8px;
      background: rgba(255, 255, 255, .93);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow .16s ease, transform .16s ease, border-color .16s ease;
    }

    .canvas-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .canvas-card.selected {
      border-color: rgba(40, 110, 240, .72);
      box-shadow: 0 0 0 4px rgba(40, 110, 240, .13), var(--shadow-md);
    }

    .canvas-card.kept {
      border-color: rgba(22, 168, 137, .42);
    }

    .card-head {
      min-height: 52px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 10px;
      padding: 13px 13px 10px;
      border-bottom: 1px solid var(--soft-line);
    }

    .card-title {
      min-width: 0;
    }

    .card-title h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 720;
    }

    .card-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(16, 17, 20, .045);
      font-size: 11px;
      font-weight: 650;
    }

    .status-pill.working {
      color: #245eb9;
      background: rgba(40, 110, 240, .10);
    }

    .status-pill.complete {
      color: #0c735d;
      background: rgba(22, 168, 137, .12);
    }

    .status-pill.kept {
      color: #8a5b09;
      background: rgba(216, 152, 38, .14);
    }

    .card-body {
      padding: 14px;
      color: #2f3540;
      font-size: 13px;
      line-height: 1.45;
    }

    .analysis-lines {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .writing-line {
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(16, 17, 20, .12), rgba(16, 17, 20, .04));
      overflow: hidden;
    }

    .writing-line:nth-child(2) {
      width: 86%;
    }

    .writing-line:nth-child(3) {
      width: 64%;
    }

    .progress-track {
      height: 6px;
      margin-top: 16px;
      border-radius: 999px;
      background: rgba(16, 17, 20, .08);
      overflow: hidden;
    }

    .progress-fill {
      display: block;
      height: 100%;
      width: var(--progress);
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--plum));
      transition: width .2s ease;
    }

    .summary-list {
      display: grid;
      gap: 9px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }

    .summary-list li {
      display: grid;
      grid-template-columns: 7px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
    }

    .summary-list li:before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
    }

    .summary-list li:nth-child(2):before {
      background: var(--mint);
    }

    .summary-list li:nth-child(3):before {
      background: var(--coral);
    }

    .metric-row {
      display: grid;
      grid-template-columns: 94px minmax(0, 1fr) 42px;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .bar-track {
      height: 18px;
      border-radius: 999px;
      background: rgba(16, 17, 20, .07);
      overflow: hidden;
    }

    .bar-fill {
      display: block;
      height: 100%;
      width: var(--bar);
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--mint));
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .mini-table th,
    .mini-table td {
      border-bottom: 1px solid var(--soft-line);
      padding: 9px 6px;
      text-align: left;
      vertical-align: top;
    }

    .mini-table th {
      color: var(--muted);
      font-weight: 650;
    }

    .diagram {
      position: relative;
      height: 214px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(16, 17, 20, .04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16, 17, 20, .04) 1px, transparent 1px),
        rgba(246, 247, 250, .72);
      background-size: 28px 28px;
      overflow: hidden;
    }

    .diagram-line {
      position: absolute;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(40, 110, 240, 0), rgba(40, 110, 240, .55), rgba(40, 110, 240, 0));
    }

    .diagram-line.one {
      width: 126px;
      left: 82px;
      top: 76px;
      transform: rotate(10deg);
    }

    .diagram-line.two {
      width: 138px;
      left: 82px;
      top: 144px;
      transform: rotate(-17deg);
      background: linear-gradient(90deg, rgba(22, 168, 137, 0), rgba(22, 168, 137, .58), rgba(22, 168, 137, 0));
    }

    .diagram-line.three {
      width: 118px;
      right: 82px;
      top: 111px;
      transform: rotate(18deg);
      background: linear-gradient(90deg, rgba(239, 106, 79, 0), rgba(239, 106, 79, .58), rgba(239, 106, 79, 0));
    }

    .node {
      position: absolute;
      min-width: 88px;
      min-height: 46px;
      border: 1px solid rgba(16, 17, 20, .10);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 12px 26px rgba(27, 31, 40, .08);
      padding: 8px;
      font-size: 11px;
      line-height: 1.25;
    }

    .node b {
      display: block;
      margin-bottom: 3px;
      font-size: 12px;
    }

    .node span {
      color: var(--muted);
    }

    .node.a {
      left: 16px;
      top: 62px;
    }

    .node.b {
      left: 178px;
      top: 34px;
    }

    .node.c {
      left: 190px;
      bottom: 28px;
    }

    .node.d {
      right: 16px;
      top: 88px;
    }

    .report-sections {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .report-section {
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      background: rgba(246, 247, 250, .74);
      padding: 10px;
    }

    .report-section b {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .report-section span {
      color: var(--muted);
      font-size: 12px;
    }

    .share-note {
      min-height: 18px;
      margin-top: 10px;
      color: var(--mint);
      font-size: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(16, 17, 20, .42);
      backdrop-filter: blur(18px);
    }

    .modal.open {
      display: grid;
    }

    .focus-view {
      width: min(1020px, 100%);
      max-height: min(820px, calc(100vh - 44px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border: 1px solid rgba(255, 255, 255, .42);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .focus-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid var(--soft-line);
    }

    .focus-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .focus-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .focus-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .focus-body {
      overflow: auto;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(40, 110, 240, .05), rgba(255, 255, 255, 0) 220px),
        #fafbfc;
    }

    .focus-body .canvas-card {
      position: static;
      width: 100%;
      min-height: 0;
      box-shadow: none;
      transform: none;
    }

    .focus-body .card-head {
      display: none;
    }

    .focus-body .card-body {
      padding: 0;
      font-size: 15px;
    }

    .toast {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 80;
      display: none;
      max-width: 290px;
      padding: 12px 14px;
      border: 1px solid rgba(16, 17, 20, .10);
      border-radius: 8px;
      color: #1d493f;
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow-sm);
      font-size: 13px;
    }

    .toast.open {
      display: block;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app {
        min-height: 100vh;
      }

      .topbar {
        padding: 0 14px;
      }

      .top-status {
        display: none;
      }

      .canvas-wrap {
        height: auto;
        min-height: calc(100vh - 56px);
        overflow: visible;
        padding: 18px 12px 220px;
      }

      .canvas {
        min-width: 0;
        min-height: 720px;
        display: grid;
        gap: 12px;
        align-content: start;
        padding: 72px 0 0;
        background-size: 36px 36px;
      }

      .canvas-card {
        position: static;
        width: 100%;
        min-height: 0;
      }

      .context-bar {
        width: calc(100vw - 24px);
        overflow: auto;
        justify-content: flex-start;
      }

      .chat-dock {
        bottom: 12px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .suggestions {
        max-height: 76px;
        overflow: auto;
      }

      .empty-hint {
        top: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="mark" aria-hidden="true"></span><span>Pi Analytics</span></div>
      <div class="top-status" id="topStatus">Empty canvas</div>
      <div class="top-actions">
        <button class="ghost-button" id="newBoardButton">New board</button>
        <button class="dark-button" id="reportButton">Report</button>
      </div>
    </header>

    <main class="stage">
      <section class="canvas-wrap" aria-label="Canvas area">
        <div class="canvas" id="canvas">
          <div class="empty-hint" id="emptyHint">
            <strong>Empty canvas</strong>
            <span>Ask Pi to start shaping the folder into useful analysis.</span>
          </div>
        </div>
      </section>

      <div class="context-bar" id="contextBar" aria-live="polite">
        <span class="selected-count" id="selectedCount">0 selected</span>
        <button class="soft-button" id="askSelectedButton">Ask</button>
        <button class="soft-button" id="keepSelectedButton">Keep</button>
        <button class="soft-button" id="openSelectedButton">Open</button>
        <button class="soft-button" id="deleteSelectedButton">Delete</button>
      </div>

      <section class="chat-dock" aria-label="Chat with Pi">
        <div class="chat-log" id="chatLog">
          <div class="message"><strong>Pi</strong> Ask me what to make from the folder.</div>
        </div>
        <div class="selected-note" id="selectedNote"></div>
        <form class="composer" id="composer">
          <input id="chatInput" autocomplete="off" aria-label="Ask Pi" placeholder="Ask Pi about the folder or selected canvas items">
          <button class="dark-button" type="submit">Send</button>
        </form>
        <div class="suggestions" aria-label="Suggestions">
          <button class="chip" data-prompt="Summarize this folder">Summarize this folder</button>
          <button class="chip" data-prompt="Find suspicious transactions">Find suspicious transactions</button>
          <button class="chip" data-prompt="Map the tables">Map the tables</button>
          <button class="chip" data-prompt="Build a board-ready report">Build a board-ready report</button>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Focused canvas item">
    <article class="focus-view">
      <div class="focus-head">
        <div>
          <h2 id="modalTitle">Canvas item</h2>
          <p id="modalSubtitle"></p>
        </div>
        <div class="focus-actions">
          <button class="soft-button" id="modalKeepButton">Keep</button>
          <button class="soft-button" id="modalShareButton">Share view</button>
          <button class="dark-button" id="modalCloseButton">Close</button>
        </div>
      </div>
      <div class="focus-body" id="modalBody"></div>
    </article>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const canvas = document.getElementById("canvas");
    const emptyHint = document.getElementById("emptyHint");
    const topStatus = document.getElementById("topStatus");
    const contextBar = document.getElementById("contextBar");
    const selectedCount = document.getElementById("selectedCount");
    const selectedNote = document.getElementById("selectedNote");
    const chatLog = document.getElementById("chatLog");
    const chatInput = document.getElementById("chatInput");
    const composer = document.getElementById("composer");
    const askSelectedButton = document.getElementById("askSelectedButton");
    const keepSelectedButton = document.getElementById("keepSelectedButton");
    const openSelectedButton = document.getElementById("openSelectedButton");
    const deleteSelectedButton = document.getElementById("deleteSelectedButton");
    const newBoardButton = document.getElementById("newBoardButton");
    const reportButton = document.getElementById("reportButton");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const modalBody = document.getElementById("modalBody");
    const modalKeepButton = document.getElementById("modalKeepButton");
    const modalShareButton = document.getElementById("modalShareButton");
    const modalCloseButton = document.getElementById("modalCloseButton");
    const toast = document.getElementById("toast");

    const state = {
      cards: [],
      selectedIds: new Set(),
      activeModalId: null,
      run: 0,
      shareReady: false
    };

    const positions = [
      [72, 70], [400, 70], [728, 70],
      [72, 350], [450, 360], [826, 350],
      [170, 635], [548, 650], [926, 635]
    ];

    const brief = {
      summary: [
        "The folder is mostly payments, supplier records, marketing results, and project outcomes.",
        "Several items are ready for a board update: summary, graph, relationship map, and review table.",
        "The strongest next step is choosing one item and asking a follow-up."
      ],
      suspicious: [
        "Three payments stand out because timing, approval, and supplier changes cluster together.",
        "The table highlights which items need review without claiming a final cause.",
        "The graph ranks signals by review priority."
      ],
      map: [
        "The tables form four clear groups: suppliers, payments, approvals, and outcomes.",
        "Payments sit at the center because most records connect through amount, owner, or date.",
        "The diagram is now available as a separate canvas item."
      ],
      report: [
        "The report uses the kept canvas items as its source material.",
        "It opens with a plain summary, then graph, table, relationship map, and closing recommendation.",
        "A hosted view can be simulated from the report card."
      ]
    };

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function nextId() {
      state.run += 1;
      return `item-${state.run}`;
    }

    function positionAt(index) {
      const point = positions[index % positions.length];
      const loop = Math.floor(index / positions.length);
      return {
        x: point[0] + loop * 44,
        y: point[1] + loop * 36
      };
    }

    function addMessage(author, text) {
      const message = document.createElement("div");
      message.className = "message";
      message.innerHTML = `<strong>${escapeHtml(author)}</strong> ${escapeHtml(text)}`;
      chatLog.appendChild(message);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("open");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("open"), 2300);
    }

    function cardById(id) {
      return state.cards.find(card => card.id === id);
    }

    function selectedCards() {
      return state.cards.filter(card => state.selectedIds.has(card.id));
    }

    function setTopStatus() {
      if (!state.cards.length) {
        topStatus.textContent = "Empty canvas";
        return;
      }
      const working = state.cards.filter(card => card.status === "working").length;
      const kept = state.cards.filter(card => card.kept).length;
      if (working) {
        topStatus.textContent = `${working} working in parallel`;
      } else if (kept) {
        topStatus.textContent = `${state.cards.length} items, ${kept} kept`;
      } else {
        topStatus.textContent = `${state.cards.length} canvas items`;
      }
    }

    function render() {
      canvas.querySelectorAll(".canvas-card").forEach(card => card.remove());
      emptyHint.classList.toggle("hidden", state.cards.length > 0);

      state.cards.forEach(card => {
        const article = document.createElement("article");
        article.className = `canvas-card${state.selectedIds.has(card.id) ? " selected" : ""}${card.kept ? " kept" : ""}`;
        article.style.setProperty("--x", `${card.x}px`);
        article.style.setProperty("--y", `${card.y}px`);
        article.style.setProperty("--w", `${card.w}px`);
        article.style.setProperty("--h", `${card.h}px`);
        article.dataset.id = card.id;
        article.innerHTML = cardMarkup(card);
        canvas.appendChild(article);
      });

      const selected = selectedCards();
      contextBar.classList.toggle("open", selected.length > 0);
      selectedCount.textContent = `${selected.length} selected`;
      selectedNote.classList.toggle("open", selected.length > 0);
      selectedNote.textContent = selected.length
        ? `Using: ${selected.map(card => card.title).join(", ")}`
        : "";
      setTopStatus();
    }

    function cardMarkup(card) {
      const status = card.kept ? "kept" : card.status;
      return `
        <div class="card-head">
          <div class="card-title">
            <h2>${escapeHtml(card.title)}</h2>
            <p>${escapeHtml(card.subtitle)}</p>
          </div>
          <div class="card-actions">
            <span class="status-pill ${status}">${card.kept ? "Kept" : card.statusLabel}</span>
            <button class="icon-button" data-action="open" aria-label="Open ${escapeHtml(card.title)}">Open</button>
          </div>
        </div>
        <div class="card-body">${contentMarkup(card)}</div>
      `;
    }

    function contentMarkup(card) {
      if (card.status === "working") return workingMarkup(card);
      if (card.type === "summary") return summaryMarkup(card);
      if (card.type === "chart") return chartMarkup(card);
      if (card.type === "diagram") return diagramMarkup(card);
      if (card.type === "table") return tableMarkup(card);
      if (card.type === "report") return reportMarkup(card);
      return summaryMarkup(card);
    }

    function workingMarkup(card) {
      return `
        <p>${escapeHtml(card.body)}</p>
        <div class="analysis-lines" aria-hidden="true">
          <span class="writing-line"></span>
          <span class="writing-line"></span>
          <span class="writing-line"></span>
        </div>
        <div class="progress-track"><span class="progress-fill" style="--progress:${card.progress}%"></span></div>
      `;
    }

    function summaryMarkup(card) {
      return `
        <p>${escapeHtml(card.body)}</p>
        <ul class="summary-list">
          ${(card.points || []).map(point => `<li>${escapeHtml(point)}</li>`).join("")}
        </ul>
      `;
    }

    function chartMarkup(card) {
      return (card.metrics || []).map(metric => `
        <div class="metric-row">
          <span>${escapeHtml(metric.label)}</span>
          <div class="bar-track"><span class="bar-fill" style="--bar:${metric.value}%"></span></div>
          <b>${metric.value}</b>
        </div>
      `).join("");
    }

    function tableMarkup(card) {
      return `
        <table class="mini-table">
          <thead><tr><th>Item</th><th>Signal</th><th>Next</th></tr></thead>
          <tbody>
            ${(card.rows || []).map(row => `
              <tr><td>${escapeHtml(row[0])}</td><td>${escapeHtml(row[1])}</td><td>${escapeHtml(row[2])}</td></tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function diagramMarkup(card) {
      const labels = card.nodes || ["Suppliers", "Payments", "Approvals", "Outcomes"];
      return `
        <div class="diagram">
          <span class="diagram-line one"></span>
          <span class="diagram-line two"></span>
          <span class="diagram-line three"></span>
          <div class="node a"><b>${escapeHtml(labels[0])}</b><span>Names and changes</span></div>
          <div class="node b"><b>${escapeHtml(labels[1])}</b><span>Amounts and dates</span></div>
          <div class="node c"><b>${escapeHtml(labels[2])}</b><span>Owners and review</span></div>
          <div class="node d"><b>${escapeHtml(labels[3])}</b><span>Result and story</span></div>
        </div>
      `;
    }

    function reportMarkup(card) {
      return `
        <p>${escapeHtml(card.body)}</p>
        <div class="report-sections">
          ${(card.sections || []).map(section => `
            <div class="report-section"><b>${escapeHtml(section[0])}</b><span>${escapeHtml(section[1])}</span></div>
          `).join("")}
        </div>
        <button class="dark-button" data-action="share" style="margin-top:12px;">Host report</button>
        <div class="share-note">${state.shareReady ? "Hosted view ready to share." : ""}</div>
      `;
    }

    function createWorkingCards(prompt) {
      const tasks = [
        ["Writing analysis", "A square note is forming on the canvas.", "Reading folder shape"],
        ["Building graph", "Pi is separating signal strength from noise.", "Preparing graph"],
        ["Mapping relationships", "Tables and files are being grouped by meaning.", "Drawing diagram"]
      ];
      const baseIndex = state.cards.length;

      const ids = tasks.map((task, index) => {
        const point = positionAt(baseIndex + index);
        const card = {
          id: nextId(),
          type: "analysis",
          title: task[0],
          subtitle: task[2],
          body: `${task[1]} Request: ${prompt}`,
          status: "working",
          statusLabel: "Working",
          progress: 8 + index * 4,
          kept: false,
          x: point.x,
          y: point.y,
          w: 286,
          h: 226
        };
        state.cards.push(card);
        return card.id;
      });

      render();
      runParallel(ids, prompt);
    }

    function runParallel(ids, prompt) {
      const timer = window.setInterval(() => {
        let done = true;
        ids.forEach((id, index) => {
          const card = cardById(id);
          if (!card || card.status !== "working") return;
          card.progress = Math.min(100, card.progress + 11 + index * 3);
          if (card.progress < 100) done = false;
        });
        render();
        if (done) {
          window.clearInterval(timer);
          completeRun(ids, prompt);
        }
      }, 260);
    }

    function classifyPrompt(prompt) {
      const text = prompt.toLowerCase();
      if (text.includes("report")) return "report";
      if (text.includes("table") || text.includes("map") || text.includes("diagram")) return "map";
      if (text.includes("suspicious") || text.includes("transaction") || text.includes("payment")) return "suspicious";
      if (text.includes("graph") || text.includes("chart")) return "chart";
      return "summary";
    }

    function selectedContextText() {
      const selected = selectedCards();
      if (!selected.length) return "";
      return ` Based on selected item${selected.length > 1 ? "s" : ""}: ${selected.map(card => card.title).join(", ")}.`;
    }

    function completeRun(ids, prompt) {
      const kind = classifyPrompt(prompt);
      const contextText = selectedContextText();
      const replacements = outputSet(kind, prompt, contextText);
      ids.forEach((id, index) => {
        const existing = cardById(id);
        if (!existing) return;
        const replacement = replacements[index] || replacements[0];
        Object.assign(existing, replacement, {
          status: "complete",
          statusLabel: "Complete",
          progress: 100
        });
      });
      render();
      addMessage("Pi", responseText(kind));
    }

    function outputSet(kind, prompt, contextText) {
      if (kind === "suspicious") {
        return [
          summaryCard("Suspicious transaction summary", "Review focus", "The main pattern is a cluster of fast payments, late supplier edits, and repeated approval owners." + contextText, brief.suspicious),
          tableCard("Review table", "Separate output", [
            ["Supplier A", "Bank details changed near payment", "Confirm owner"],
            ["Supplier C", "Three split amounts in one week", "Review together"],
            ["Invoice 1042", "Approved outside usual pattern", "Ask owner"],
            ["Payment batch 7", "Higher priority than peers", "Keep for report"]
          ]),
          chartCard("Priority graph", "Separate output", [
            ["Timing", 88], ["Supplier edit", 76], ["Owner overlap", 64], ["Amount split", 52]
          ])
        ];
      }

      if (kind === "map") {
        return [
          diagramCard("Relationship diagram", "Separate output", ["Suppliers", "Payments", "Approvals", "Outcomes"]),
          tableCard("Table overview", "Separate output", [
            ["Suppliers", "Names, owners, changes", "Use as origin"],
            ["Payments", "Amounts, dates, status", "Center of map"],
            ["Approvals", "People and review notes", "Trace decisions"],
            ["Outcomes", "Revenue, cost, impact", "Use in report"]
          ]),
          summaryCard("Map summary", "Quick summary", "The folder becomes easier to inspect when tables are grouped by business meaning." + contextText, brief.map)
        ];
      }

      if (kind === "report") {
        return [
          reportCard("Board-ready report", "Final output", "A concise board report is assembled from the strongest canvas items."),
          summaryCard("Executive summary", "Report opening", "The story is ready: what the folder contains, what stands out, and what should happen next." + contextText, brief.report),
          chartCard("Report graph", "Evidence output", [
            ["Clarity", 92], ["Impact", 80], ["Confidence", 68], ["Next step", 74]
          ])
        ];
      }

      if (kind === "chart") {
        return [
          chartCard("Graph from selection", "Follow-up output", [
            ["Volume", 84], ["Risk", 72], ["Impact", 67], ["Confidence", 58]
          ]),
          summaryCard("Graph summary", "Quick summary", "The graph ranks the selected item by signal strength and likely business impact." + contextText, brief.summary),
          tableCard("Graph support", "Evidence output", [
            ["Volume", "Largest movement", "Inspect"],
            ["Risk", "Pattern repeats", "Keep"],
            ["Impact", "Material value", "Add to report"]
          ])
        ];
      }

      return [
        summaryCard("Folder summary", "Separate output", "Pi found a clean story across payments, suppliers, marketing results, and project outcomes." + contextText, brief.summary),
        chartCard("Signal graph", "Separate output", [
          ["Payments", 82], ["Suppliers", 70], ["Marketing", 58], ["Projects", 44]
        ]),
        diagramCard("Table relationship map", "Separate output", ["Suppliers", "Payments", "Channels", "Projects"])
      ];
    }

    function summaryCard(title, subtitle, body, points) {
      return { type: "summary", title, subtitle, body, points, w: 318, h: 250 };
    }

    function chartCard(title, subtitle, metrics) {
      return { type: "chart", title, subtitle, body: "", metrics, w: 318, h: 250 };
    }

    function diagramCard(title, subtitle, nodes) {
      return { type: "diagram", title, subtitle, body: "", nodes, w: 360, h: 292 };
    }

    function tableCard(title, subtitle, rows) {
      return { type: "table", title, subtitle, body: "", rows, w: 378, h: 286 };
    }

    function reportCard(title, subtitle, body) {
      return {
        type: "report",
        title,
        subtitle,
        body,
        w: 382,
        h: 356,
        sections: [
          ["Summary", "What the folder shows in plain language."],
          ["Evidence", "Graph, table, and relationship map as separate canvas items."],
          ["Decision", "Recommended next step and owner-ready wording."]
        ]
      };
    }

    function responseText(kind) {
      if (kind === "suspicious") return "I added a summary, review table, and priority graph as separate canvas items.";
      if (kind === "map") return "I added a relationship diagram, table overview, and quick summary.";
      if (kind === "report") return "I assembled a report card and supporting items. You can host it from the report.";
      if (kind === "chart") return "I added a graph plus supporting summary and table.";
      return "I added a summary, graph, and relationship map. Select any item to ask a follow-up.";
    }

    function submitPrompt(prompt) {
      const text = prompt.trim();
      if (!text) return;
      addMessage("You", text);
      createWorkingCards(text);
      chatInput.value = "";
    }

    function toggleSelection(id, additive) {
      if (!additive) state.selectedIds.clear();
      if (state.selectedIds.has(id) && additive) {
        state.selectedIds.delete(id);
      } else {
        state.selectedIds.add(id);
      }
      render();
    }

    function keepSelected() {
      selectedCards().forEach(card => {
        card.kept = true;
      });
      render();
      if (state.selectedIds.size) showToast("Selected item kept.");
    }

    function deleteSelected() {
      if (!state.selectedIds.size) return;
      state.cards = state.cards.filter(card => !state.selectedIds.has(card.id));
      state.selectedIds.clear();
      render();
      showToast("Selected item deleted.");
    }

    function askAboutSelected() {
      const cards = selectedCards();
      if (!cards.length) return;
      chatInput.value = `Regarding ${cards.map(card => card.title).join(", ")}, show me a diagram with a quick summary`;
      chatInput.focus();
    }

    function openCard(id) {
      const card = cardById(id);
      if (!card) return;
      state.activeModalId = id;
      modalTitle.textContent = card.title;
      modalSubtitle.textContent = card.subtitle;
      modalBody.innerHTML = `<article class="canvas-card">${cardMarkup(card)}</article>`;
      modal.classList.add("open");
    }

    function shareReport() {
      state.shareReady = true;
      render();
      showToast("Hosted view ready to share.");
      addMessage("Pi", "The hosted report view is ready.");
    }

    canvas.addEventListener("click", event => {
      const action = event.target.closest("[data-action]");
      const cardEl = event.target.closest(".canvas-card");
      if (!cardEl) return;
      const id = cardEl.dataset.id;
      if (action?.dataset.action === "open") {
        openCard(id);
        return;
      }
      if (action?.dataset.action === "share") {
        shareReport();
        return;
      }
      toggleSelection(id, event.shiftKey || event.metaKey || event.ctrlKey);
    });

    composer.addEventListener("submit", event => {
      event.preventDefault();
      submitPrompt(chatInput.value);
    });

    document.querySelectorAll("[data-prompt]").forEach(button => {
      button.addEventListener("click", () => submitPrompt(button.dataset.prompt));
    });

    askSelectedButton.addEventListener("click", askAboutSelected);
    keepSelectedButton.addEventListener("click", keepSelected);
    deleteSelectedButton.addEventListener("click", deleteSelected);
    openSelectedButton.addEventListener("click", () => {
      const first = selectedCards()[0];
      if (first) openCard(first.id);
    });

    newBoardButton.addEventListener("click", () => {
      state.cards = [];
      state.selectedIds.clear();
      state.shareReady = false;
      render();
      addMessage("Pi", "New blank canvas ready.");
    });

    reportButton.addEventListener("click", () => {
      submitPrompt("Build a board-ready report");
    });

    modalKeepButton.addEventListener("click", () => {
      const card = cardById(state.activeModalId);
      if (!card) return;
      card.kept = true;
      render();
      showToast("Focused item kept.");
    });

    modalShareButton.addEventListener("click", shareReport);
    modalCloseButton.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", event => {
      if (event.target === modal) modal.classList.remove("open");
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        modal.classList.remove("open");
        state.selectedIds.clear();
        render();
      }
      if ((event.key === "Delete" || event.key === "Backspace") && state.selectedIds.size && document.activeElement !== chatInput) {
        deleteSelected();
      }
    });

    render();
  </script>
</body>
</html>
